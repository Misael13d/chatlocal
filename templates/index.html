<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Local Seguro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: Arial; display: flex; flex-direction: column; }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
        }
        .msg { margin: 5px 0; }
        .file { margin: 5px 0; }
        .file strong { color: #2c3e50; }
        .file a { color: #1a73e8; text-decoration: underline; cursor: pointer; }

        .bottom-bar {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #fff;
            border-top: 1px solid #ccc;
            gap: 8px;
            flex-wrap: wrap;
        }
        .bottom-bar input[type="text"] {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            font-size: 16px;
        }
        .bottom-bar button {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .bottom-bar button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        #file-input { display: none; }
        .file-label {
            display: inline-flex;
            align-items: center;
            padding: 10px 15px;
            background: #eee;
            border: 1px solid #aaa;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
        }
        #file-name {
            font-size: 14px;
            color: #555;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="chat-box"></div>

    <div class="bottom-bar">
        <input type="text" id="mensaje" autofocus>
        <button onclick="enviarMensaje()">Enviar</button>

        <input type="file" id="file-input">
        <label for="file-input" class="file-label">Elegir archivo</label>
        <span id="file-name"></span>
        <button onclick="enviarArchivo()" id="send-file-btn" disabled>Enviar archivo</button>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const UPLOAD_TOKEN = "{{ upload_token }}";
        const socket = io();
        let archivoSeleccionado = null;

        // Función para descargar archivo mediante fetch y blob (evita error de certificado)
        function descargarArchivo(urlBase, nombreArchivo) {
            const url = urlBase + "?token=" + UPLOAD_TOKEN;
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Error de red');
                    return response.blob();
                })
                .then(blob => {
                    const blobUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = nombreArchivo || 'archivo';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(blobUrl);
                    document.body.removeChild(a);
                })
                .catch(error => {
                    alert('No se pudo descargar el archivo. Verifica tu conexión.');
                    console.error(error);
                });
        }

        socket.on('historial', function(historial) {
            historial.forEach(function(entrada) {
                if (entrada.tipo === 'mensaje') {
                    agregarMensaje(`${entrada.datos.texto}`);
                } else if (entrada.tipo === 'archivo') {
                    const d = entrada.datos;
                    // Crear enlace que llame a descargarArchivo
                    agregarMensaje(
                        `${d.original} <a onclick="descargarArchivo('${d.url}', '${d.original}')" style="cursor:pointer;">Descargar</a>`,
                        'file'
                    );
                }
            });
        });

        socket.on('mensaje', function(data) {
            agregarMensaje(`${data.texto}`);
        });

        socket.on('archivo', function(data) {
            agregarMensaje(
                `${data.original} <a onclick="descargarArchivo('${data.url}', '${data.original}')" style="cursor:pointer;">Descargar</a>`,
                'file'
            );
        });

        function agregarMensaje(contenido, clase = 'msg') {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = clase;
            div.innerHTML = contenido;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function enviarMensaje() {
            const nombre = 'Anónimo';
            const texto = document.getElementById('mensaje').value.trim();
            if (texto) {
                socket.emit('mensaje', { nombre, texto });
                document.getElementById('mensaje').value = '';
                document.getElementById('mensaje').focus();
            }
        }

        document.getElementById('mensaje').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') enviarMensaje();
        });

        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('file-input');
            const sendBtn = document.getElementById('send-file-btn');
            const nameSpan = document.getElementById('file-name');

            fileInput.addEventListener('change', function() {
                archivoSeleccionado = fileInput.files[0];
                if (archivoSeleccionado) {
                    nameSpan.textContent = archivoSeleccionado.name;
                    sendBtn.disabled = false;
                } else {
                    nameSpan.textContent = '';
                    sendBtn.disabled = true;
                }
            });

            fileInput.addEventListener('click', function() {
                this.value = null;
                archivoSeleccionado = null;
                nameSpan.textContent = '';
                sendBtn.disabled = true;
            });
        });

        function enviarArchivo() {
            if (!archivoSeleccionado) return;
            const nombre = 'Anónimo';
            const formData = new FormData();
            formData.append('file', archivoSeleccionado);
            formData.append('nombre', nombre);
            formData.append('token', UPLOAD_TOKEN);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(function(response) {
                if (!response.ok) alert('Error al subir archivo');
                archivoSeleccionado = null;
                document.getElementById('file-input').value = '';
                document.getElementById('file-name').textContent = '';
                document.getElementById('send-file-btn').disabled = true;
            })
            .catch(function(error) { console.error('Error:', error); });
        }
    </script>
</body>
</html>
